  function carregarNovoChat() {

 

    $.post('chat_pdf_onitutor_moni.html', {

      const recordButton = document.getElementById('start');

      let audioContext;
      let mediaStream;
      let mediaStreamSource;
      let scriptProcessor;
      let audioData = [];
      let gravando = false;
      let hashAudio = '';

      function gerarHash() {
        const timestamp = new Date().getTime();
        hashAudio = timestamp;
        return timestamp;
      }

      recordButton.onclick = function() {
        if (gravando) {
          recordButton.innerHTML = '<i class="ph ph-microphone"></i>';
          stopRecording();
          gravando = false;
        } else {
          gravando = true;
          recordButton.innerHTML = '<i class="ph ph-pause"></i>';
          startRecording();
        }
      };

      function startRecording() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert('Seu navegador não suporta gravação de áudio.');
          return;
        }

        // Limpar dados anteriores
        audioData = [];

        navigator.mediaDevices.getUserMedia({
          audio: {
            channelCount: 1,
            sampleRate: 44100,
            sampleSize: 16
          }
        }).then(stream => {
          audioContext = new(window.AudioContext || window.webkitAudioContext)();
          mediaStream = stream;
          mediaStreamSource = audioContext.createMediaStreamSource(mediaStream);
          scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

          scriptProcessor.onaudioprocess = audioProcessHandler;
          mediaStreamSource.connect(scriptProcessor);
          scriptProcessor.connect(audioContext.destination);

          console.log('Gravação iniciada');
        }).catch(error => {
          console.error('Erro ao acessar o microfone: ', error);
          gravando = false;
          recordButton.innerHTML = '<i class="ph ph-microphone"></i>';
        });
      }

      function audioProcessHandler(event) {
        if (!gravando) return;

        const audioBuffer = event.inputBuffer.getChannelData(0);
        audioData.push(new Float32Array(audioBuffer));
      }

      function stopRecording() {
        if (scriptProcessor) {
          scriptProcessor.disconnect();
        }
        if (mediaStreamSource) {
          mediaStreamSource.disconnect();
        }
        if (mediaStream) {
          mediaStream.getTracks().forEach(track => track.stop());
        }

        if (audioData.length > 0) {
          const audioBlob = exportWAV(audioData);

          // Testar o áudio antes de enviar (opcional)
          testAudioBeforeSend(audioBlob);

          sendAudioToServer(audioBlob);
        } else {
          console.warn('Nenhum dado de áudio capturado');
        }

        audioData = [];
        console.log('Gravação finalizada');
      }

        const audioUrl = URL.createObjectURL(audioBlob);

          console.log('Áudio testado - Duração:', testAudio.duration + ' segundos');
        };

        testAudio.onerror = function(e) {
          console.error('Erro no áudio gerado:', e);
        };

        // Reproduzir automaticamente (opcional)
        // testAudio.play().catch(e => console.log('Reprodução automática bloqueada:', e));
      }

        $("#conteudo_pergunta").css('display', 'flex');

        conteudoChat.scrollTop = conteudoChat.scrollHeight;

        $.post('chatpdf/moni_onepage.html', {
          FUNCAO: 'CARREGAR_AUDIO_PERGUNTA',
          HASH_AUDIO: hashAudio
        }, function(resposta) {
          // $("#conteudochat").html(resposta).show();
          // document.getElementById('carregamento').style.display = 'none';
          $("#conteudo_pergunta").html(resposta);


          document.getElementById('carregamento').style.display = 'block';
          document.getElementById('digitando').innerHTML = "Gravando audio..."


        });



        // Mostrar indicador de carregamento



        const xhr = new XMLHttpRequest();
        xhr.open('POST.html', 'chatpdf/audioQuestion_moni92bd.json?file=' + hashAudio +
          '&SessaoID=' + vSessaoID +
          '&INSTITUICAO_ID=' + instituicaoID +
          '&SESSION_ID=' + vSessaoID +
          '&ID_CONTEUDO=' + vIDConteudo +
          '&TIPO_CONTEUDO=' + TipoOnePage +
          '&ESTUDANTE_ID=' + EstudanteID +
          '&instituicaoID=' + instituicaoID, true);

        xhr.onload = function() {
          if (xhr.status === 200) {
            console.log('Resposta do servidor:', xhr.responseText);
            carregarConversas(instituicaoID, EstudanteID, vIDConteudo, TipoOnePage)
            try {
              const response = JSON.parse(xhr.responseText);

                console.log('Áudio salvo com sucesso:', response.fileName);

      function exportWAV(audioData) {
        const sampleRate = audioContext.sampleRate;
        const bufferLength = audioData.reduce((acc, data) => acc + data.length, 0);
        const samples = new Float32Array(bufferLength);

        let offset = 0;
        for (let i = 0; i < audioData.length; i++) {
          samples.set(audioData[i], offset);
          offset += audioData[i].length;
        }

        return encodeWAV(samples, sampleRate);
      }

      function encodeWAV(samples, sampleRate) {
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);

        // Cabeçalho WAV
        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + samples.length * 2, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM format
        view.setUint16(22, 1, true); // Mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true); // byte rate
        view.setUint16(32, 2, true); // block align
        view.setUint16(34, 16, true); // bits per sample
        writeString(view, 36, 'data');
        view.setUint32(40, samples.length * 2, true);

        // Converter para PCM 16-bit
        floatTo16BitPCM(view, 44, samples);

        return new Blob([view], {
          type: 'audio/wav'
        });
      }

      function floatTo16BitPCM(output, offset, input) {
        for (let i = 0; i < input.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, input[i]));
          output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
      }

      function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }
