  function carregarNovoChat() {



    $.post('chat_pdf_onitutor.html', {

      SESSION_ID: '3224an6470got0j4pmjki2alrb'

    }, function(resposta) {
      $("#div_chat_onitutor").html(resposta)


      const recordButton = document.getElementById('start');


      let audioContext;
      let mediaStream;
      let mediaStreamSource;
      let scriptProcessor;
      let audioData = [];
      let gravando = false;
      let hashAudio = '';

      function gerarHash() {
        const timestamp = new Date().getTime();
        hashAudio = timestamp;
        return timestamp;
      }

      recordButton.onclick = function() {
        hashAudio = gerarHash();
        if (gravando) {
          recordButton.innerHTML = '<i class="ph ph-microphone"></i>';
          stopRecording();
          gravando = false;
        } else {
          gravando = true;
          recordButton.innerHTML = '<i class="ph ph-pause"></i>'; // Muda ícone para stop
          startRecording();
        }
      };

      function startRecording() {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          alert('Seu navegador não suporta gravação de áudio.');
          return;
        }

        navigator.mediaDevices.getUserMedia({
          audio: true
        }).then(stream => {
          audioContext = new(window.AudioContext || window.webkitAudioContext)();
          mediaStream = stream;
          mediaStreamSource = audioContext.createMediaStreamSource(mediaStream);
          scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);

          mediaStreamSource.connect(scriptProcessor);
          scriptProcessor.connect(audioContext.destination);

          scriptProcessor.onaudioprocess = audioProcessHandler;
        }).catch(error => {
          console.error('Erro ao acessar o microfone: ', error);
        });
      }

      function audioProcessHandler(event) {
        const audioBuffer = event.inputBuffer.getChannelData(0);
        audioData.push(new Float32Array(audioBuffer));
      }

      function stopRecording() {
        scriptProcessor.disconnect();
        mediaStreamSource.disconnect();
        mediaStream.getTracks().forEach(track => track.stop());

        const audioBlob = exportWAV(audioData);
        sendAudioToServer(audioBlob);
        audioData = []; // Limpar dados do áudio para a próxima gravação
      }

      function sendAudioToServer(blob) {
        var hashAudio = gerarHash()
        const componenteID = document.getElementById("componenteID").value;
        const componenteHash = document.getElementById("componenteHash").value;
        const instituicaoID = document.getElementById("instituicaoID").value;
        var vSessaoID = '3224an6470got0j4pmjki2alrb';
        var aguarde = document.createElement('div');
        aguarde.setAttribute('id', 'aguarde');
        aguarde.innerHTML = '<span> Gravando Audio... </span>';
        document.getElementById('conteudochat').appendChild(aguarde);
        var URL_CHAT = 'arquivo-pdfed23.pdf?Arquivo=53618&amp;Token=3224an6470got0j4pmjki2alrb';
        var urlPersonalizada = '&urlParaPerguntaPublishPRO=' + URL_CHAT;
        // urlParaPerguntaPublishPRO

        const xhr = new XMLHttpRequest();
        xhr.open('POST.html', 'chatpdf/audioQuestion92bd.html?file=' + hashAudio + '&componenteID=' + componenteID + '&componenteHash=' + componenteHash + urlPersonalizada + '&SessaoID=' + vSessaoID + '&instituicaoID=' + instituicaoID, true);

        xhr.onload = function() {
          if (xhr.status === 200) {
            console.log('Resposta do servidor:', xhr.responseText);


            carregarConversas(componenteHash);
            document.getElementById('aguarde').remove();
          } else {
            console.error('Erro ao enviar áudio. Status:', xhr.status);
          }
        };

        xhr.onerror = function() {
          console.error('Erro ao enviar áudio. Requisição falhou.');
        };

        const formData = new FormData();
        formData.append('audio', blob, `${hashAudio}.wav`);
        xhr.send(formData);
      }

      function exportWAV(audioData) {
        const bufferLength = audioData.reduce((acc, data) => acc + data.length, 0);
        const resultBuffer = new Float32Array(bufferLength);
        let offset = 0;

        for (let i = 0; i < audioData.length; i++) {
          resultBuffer.set(audioData[i], offset);
          offset += audioData[i].length;
        }

        const wavBuffer = encodeWAV(resultBuffer);
        return new Blob([wavBuffer], {
          type: 'audio/wav'
        });
      }

      function encodeWAV(samples) {
        const sampleRate = audioContext.sampleRate;
        const buffer = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(buffer);

        writeString(view, 0, 'RIFF');
        view.setUint32(4, 36 + samples.length * 2, true);
        writeString(view, 8, 'WAVE');
        writeString(view, 12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(view, 36, 'data');
        view.setUint32(40, samples.length * 2, true);

        floatTo16BitPCM(view, 44, samples);

        return view;
      }

      function floatTo16BitPCM(output, offset, input) {
        for (let i = 0; i < input.length; i++, offset += 2) {
          let s = Math.max(-1, Math.min(1, input[i]));
          output.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
      }

      function writeString(view, offset, string) {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      }


      //////////////////////////////
